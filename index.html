<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0f1113" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Plan Tracker" />
<title>Grisedale Horseshoe · 13-Week Plan</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMxMzE2MWEiLz48Y2lyY2xlIGN4PSI0NiIgY3k9IjE4IiByPSI2IiBmaWxsPSIjZmFjYzE1Ii8+PHBhdGggZD0iTTQgNTMgTDI0IDE3IEwzNiAzOCBMNDQgMjUgTDYwIDUzIFoiIGZpbGw9IiNlYzVhMjgiLz48cGF0aCBkPSJNMjAuNSAyNSBMMjQgMTcgTDI3LjUgMjUgTDI0IDI4LjUgWiIgZmlsbD0iI2Y0ZjZmOSIvPjwvc3ZnPg==" />
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTQiIGZpbGw9IiMxMzE2MWEiLz48Y2lyY2xlIGN4PSI0NiIgY3k9IjE4IiByPSI2IiBmaWxsPSIjZmFjYzE1Ii8+PHBhdGggZD0iTTQgNTMgTDI0IDE3IEwzNiAzOCBMNDQgMjUgTDYwIDUzIFoiIGZpbGw9IiNlYzVhMjgiLz48cGF0aCBkPSJNMjAuNSAyNSBMMjQgMTcgTDI3LjUgMjUgTDI0IDI4LjUgWiIgZmlsbD0iI2Y0ZjZmOSIvPjwvc3ZnPg==" />
<style>
  :root{
    color-scheme:dark;
    --bg:#0f1113; --bg2:#181b1f; --panel:#141619; --panel2:#1a1d21;
    --line:#23262b; --line2:#2c3037;
    --txt:#e8eaed; --muted:#929aa3; --faint:#616771;
    --accent:#ec5a28; --accent2:#ef6e42;
    --good:#3fae7d; --shadow:0 8px 28px rgba(0,0,0,.32);
    --radius:12px;
    --t-easy:#5bb38a; --t-recovery:#5aa6d4; --t-threshold:#cfa23e;
    --t-hills:#d56e7a; --t-descent:#52b3c2; --t-simulation:#cc74a6;
    --t-long:#8e85d2; --t-race:#cfae42; --t-rest:#727a83; --t-bike:#6b8fd4;
  }
  [data-theme="light"]{
    color-scheme:light;
    --bg:#f7f8f9; --bg2:#eef0f2; --panel:#ffffff; --panel2:#f8f9fa;
    --line:#e8eaed; --line2:#dee1e5;
    --txt:#1a1d20; --muted:#646b73; --faint:#9aa1a8;
    --accent:#e0541f; --accent2:#e86f3e;
    --good:#2f9e6a; --shadow:0 1px 2px rgba(20,30,50,.05),0 12px 28px rgba(20,30,50,.07);
    --t-easy:#2f9e6a; --t-recovery:#2f84c0; --t-threshold:#b9842a;
    --t-hills:#cd5562; --t-descent:#2f97a8; --t-simulation:#ba5a93;
    --t-long:#6c62c4; --t-race:#b89b2e; --t-rest:#7b828a; --t-bike:#3d6dc4;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--txt);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Top bar ---------- */
  .topbar{
    position:sticky;top:0;z-index:40;
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:13px 24px;
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:center;gap:11px;margin-right:auto}
  .mark{
    width:30px;height:30px;border-radius:8px;flex:0 0 auto;
    background:var(--panel2);border:1px solid var(--line2);
    display:grid;place-items:center;
  }
  .mark svg{display:block}
  .brand h1{font-size:14px;margin:0;font-weight:600;letter-spacing:.1px}
  .brand p{margin:0;font-size:11.5px;color:var(--muted)}
  .mini{display:flex;gap:16px;align-items:center}
  .mini .m{display:flex;flex-direction:column;line-height:1.15;text-align:right}
  .mini .m b{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
  .mini .m span{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .iconbtn{
    background:transparent;border:1px solid var(--line2);color:var(--muted);
    border-radius:8px;padding:7px 10px;font-size:13px;display:inline-flex;align-items:center;gap:7px;
    transition:.15s;
  }
  .iconbtn:hover{border-color:var(--faint);color:var(--txt)}
  .iconbtn:disabled{opacity:.4;cursor:default}
  .iconbtn:disabled:hover{border-color:var(--line2);color:var(--muted)}

  .wrap{max-width:1400px;margin:0 auto;padding:24px}

  /* ---------- Dashboard ---------- */
  .dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-bottom:20px}
  .stat{
    background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;position:relative;overflow:hidden;
  }
  .stat .lab{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
  .stat .val{font-size:25px;font-weight:600;margin-top:7px;font-variant-numeric:tabular-nums;letter-spacing:-.3px}
  .stat .val small{font-size:13px;color:var(--muted);font-weight:500}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:4px}
  .stat .spark{display:none}
  .stat.progress{grid-column:span 2}
  @media(max-width:640px){.stat.progress{grid-column:span 1}}
  .bar{height:6px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:14px}
  .bar>i{display:block;height:100%;background:var(--accent);border-radius:999px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .prow{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:9px}
  .prow b{color:var(--txt);font-variant-numeric:tabular-nums}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{
    border:1px solid var(--line2);background:transparent;color:var(--muted);
    padding:5px 10px;border-radius:999px;font-size:12px;display:inline-flex;align-items:center;gap:7px;transition:.15s;
    user-select:none;
  }
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--c)}
  .chip[aria-pressed="true"]{color:var(--txt);border-color:color-mix(in srgb,var(--c) 45%, var(--line2))}
  .chip:not([aria-pressed="true"]){opacity:.45}
  .chip .n{font-size:10px;color:var(--faint);font-variant-numeric:tabular-nums}
  .search{
    flex:1;min-width:160px;background:var(--panel);border:1px solid var(--line2);color:var(--txt);
    border-radius:8px;padding:8px 12px;font-size:13px;
  }
  .search::placeholder{color:var(--faint)}
  .search:focus{outline:none;border-color:var(--faint)}
  .seg{display:flex;border:1px solid var(--line2);border-radius:8px;overflow:hidden;background:var(--bg2)}
  .seg button{background:transparent;border:0;color:var(--muted);padding:7px 12px;font-size:12px;transition:.15s}
  .seg button[aria-pressed="true"]{background:var(--panel);color:var(--txt);font-weight:600}

  /* ---------- Weeks ---------- */
  .week{margin-bottom:14px;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;background:var(--bg)}
  .week-head{
    display:flex;align-items:center;gap:13px;padding:13px 16px;cursor:pointer;
    background:var(--panel);border-bottom:1px solid var(--line);transition:background .15s;
  }
  .week.collapsed .week-head{border-bottom:0}
  .week-head:hover{background:var(--panel2)}
  .week-head .caret{transition:.2s;color:var(--faint);font-size:11px}
  .week.collapsed .caret{transform:rotate(-90deg)}
  .week.collapsed .week-body{display:none}
  .wn{font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line2);padding:3px 9px;border-radius:6px;white-space:nowrap}
  .wtitle{display:flex;flex-direction:column;min-width:0}
  .wtitle b{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .wtitle span{font-size:11.5px;color:var(--muted)}
  .wstats{margin-left:auto;display:flex;gap:16px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .wstat{font-size:12px;color:var(--muted);white-space:nowrap}
  .wstat b{color:var(--txt);font-weight:600;font-variant-numeric:tabular-nums}
  .phasebadge{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;padding:2px 7px;border-radius:5px;font-weight:600;border:1px solid var(--line2);color:var(--muted)}
  .phase1,.phase2{background:transparent}

  .week-grid{display:grid;grid-template-columns:repeat(7,minmax(165px,1fr));gap:0;overflow-x:auto}
  .day-cell{
    border-right:1px solid var(--line);min-height:112px;padding:8px;display:flex;flex-direction:column;gap:8px;
    transition:background .15s;
  }
  .day-cell:last-child{border-right:0}
  .day-cell.drag-over{background:color-mix(in srgb,var(--accent) 8%,transparent)}
  .day-cell.is-today{background:color-mix(in srgb,var(--accent) 5%,transparent)}
  .day-head{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--muted);padding:0 2px}
  .day-head .dnum{font-weight:600;color:var(--txt)}
  .day-head.today .dnum{color:var(--accent)}
  .day-head .addbtn{opacity:0;border:0;background:transparent;color:var(--faint);font-size:16px;line-height:1;padding:0 4px;transition:.15s}
  .day-cell:hover .addbtn{opacity:1}
  .day-head .addbtn:hover{color:var(--txt)}

  /* ---------- Card ---------- */
  .card{
    background:var(--panel);border:1px solid var(--line2);border-left:2px solid var(--c);
    border-radius:8px;padding:9px 10px;cursor:grab;position:relative;transition:border-color .12s,box-shadow .12s;
  }
  .card:hover{box-shadow:var(--shadow);border-color:color-mix(in srgb,var(--c) 40%,var(--line2))}
  .card.dragging{opacity:.4}
  .card .ctype{display:flex;align-items:center;gap:6px;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--c)}
  .card .ctype .icons{margin-left:auto;display:flex;gap:3px;font-size:11px;opacity:.7;filter:grayscale(.2)}
  .card .cname{font-size:12.5px;font-weight:600;margin:5px 0 6px;line-height:1.3}
  .card .cmeta{display:flex;flex-wrap:wrap;gap:5px}
  .pill{font-size:10.5px;color:var(--muted);background:var(--bg2);border:1px solid var(--line);border-radius:5px;padding:1px 6px;font-variant-numeric:tabular-nums}
  .pill.zone{color:var(--muted);border-color:var(--line)}
  .check{
    position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:5px;border:1.5px solid var(--line2);
    background:transparent;display:grid;place-items:center;color:transparent;font-size:11px;transition:.15s;
  }
  .check:hover{border-color:var(--good)}
  .card.done{opacity:.5}
  .card.done .cname{text-decoration:line-through;text-decoration-color:var(--faint)}
  .card.done .check{background:var(--good);border-color:var(--good)}
  .card.done .check::after{content:"";width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-1px}
  .card.race{border-color:var(--t-race);border-left-color:var(--t-race);background:color-mix(in srgb,var(--t-race) 7%,var(--panel))}
  .card.race .cname{font-weight:700}
  .card.rest{opacity:.6}
  .day-cell .empty{font-size:11px;color:var(--faint);text-align:center;padding:12px 0;border:1px dashed var(--line2);border-radius:6px}

  /* ---------- Modal ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(8,10,12,.45);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow:auto}
  .backdrop.open{display:flex}
  .modal{width:min(620px,100%);background:var(--panel);border:1px solid var(--line2);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
  .modal-head .mdate{font-size:12px;color:var(--muted)}
  .modal-head h3{margin:3px 0 0;font-size:16px;font-weight:600}
  .modal-head .x{margin-left:auto;background:transparent;border:0;color:var(--muted);font-size:22px;line-height:1;cursor:pointer}
  .modal-head .x:hover{color:var(--txt)}
  .modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:16px;max-height:64vh;overflow:auto}
  .field{display:flex;flex-direction:column;gap:6px}
  .field>label{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .field input,.field select,.field textarea{
    background:var(--bg2);border:1px solid var(--line2);color:var(--txt);border-radius:8px;padding:9px 11px;font:inherit;width:100%;
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--faint)}
  .field textarea{resize:vertical;min-height:64px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .coach{background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:12px 14px;white-space:pre-wrap;font-size:13px;color:var(--txt);line-height:1.55}
  .donerow{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--line2);border-radius:8px;padding:12px 14px}
  .toggle{position:relative;width:44px;height:25px;border-radius:999px;background:var(--line2);border:0;transition:.2s;flex:0 0 auto;cursor:pointer}
  .toggle::after{content:"";position:absolute;top:3px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
  .toggle[aria-pressed="true"]{background:var(--good)}
  .toggle[aria-pressed="true"]::after{left:22px}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;align-items:center}
  .btn{border:1px solid var(--line2);background:transparent;color:var(--txt);padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;transition:.15s}
  .btn:hover{border-color:var(--faint)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.06);border-color:var(--accent)}
  .btn.danger{color:#d9685f;border-color:color-mix(in srgb,#d9685f 35%,var(--line2))}
  .btn.danger:hover{border-color:#d9685f}
  .sectlabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin:2px 0 -4px}

  .legend-foot{margin:28px 0 50px;color:var(--faint);font-size:12px;text-align:center;line-height:1.7}
  .legend-foot b{color:var(--muted)}

  /* menu + drop overlay */
  .menuwrap{position:relative}
  .menu{position:absolute;right:0;top:calc(100% + 8px);min-width:215px;background:var(--panel);border:1px solid var(--line2);border-radius:11px;box-shadow:var(--shadow);padding:6px;z-index:55;display:flex;flex-direction:column;gap:1px}
  .menu[hidden]{display:none}
  .menu button{text-align:left;background:transparent;border:0;color:var(--txt);padding:8px 10px;border-radius:7px;font-size:13px;cursor:pointer}
  .menu button:hover{background:var(--bg2)}
  .menu .sep{height:1px;background:var(--line);margin:5px 4px}
  .dropzone{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:color-mix(in srgb,var(--bg) 76%,transparent);backdrop-filter:blur(2px)}
  .dropzone.show{display:flex}
  .dz-inner{pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:7px;padding:44px 70px;border:2px dashed var(--accent);border-radius:18px;background:var(--panel);box-shadow:var(--shadow)}
  .dz-emoji{font-size:38px}
  .dz-inner b{font-size:17px}
  .dz-inner span{font-size:13px;color:var(--muted)}

  /* filter dropdown + prominent undo */
  .iconbtn.active{border-color:var(--accent);color:var(--accent)}
  .filtermenu{min-width:300px;max-width:340px;left:0;right:auto}
  .filtermenu .chips{flex-wrap:wrap;gap:6px;padding:2px 4px 6px}
  .fm-head{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);padding:4px 6px 6px}
  .fm-line{display:flex;justify-content:space-between;align-items:center;text-align:left;width:100%;background:transparent;border:0;color:var(--txt);padding:8px 10px;border-radius:7px;font-size:13px;cursor:pointer}
  .fm-line:hover{background:var(--bg2)}
  .undobtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--accent);background:color-mix(in srgb,var(--accent) 13%,transparent);color:var(--accent);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;transition:.15s;cursor:pointer}
  .undobtn:hover:not(:disabled){background:var(--accent);color:#fff}
  .undobtn:disabled{border-color:var(--line2);background:transparent;color:var(--faint);opacity:.5;cursor:default;font-weight:500}

  /* tabs + strength view */
  .tabs{display:inline-flex;gap:4px;background:var(--bg2);border:1px solid var(--line2);border-radius:10px;padding:3px;margin-bottom:20px}
  .tab{background:transparent;border:0;color:var(--muted);padding:7px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
  .tab[aria-pressed="true"]{background:var(--panel);color:var(--txt)}
  .tab:hover:not([aria-pressed="true"]){color:var(--txt)}
  .s-intro{max-width:780px;margin-bottom:18px}
  .s-intro h2{font-size:20px;margin:0 0 6px;letter-spacing:-.2px}
  .s-intro p{color:var(--muted);font-size:14px;line-height:1.6;margin:0}
  .s-principles{max-width:780px;margin-bottom:26px}
  .s-principles h3{font-size:13px;margin:0;font-weight:600}
  .s-principles ul{margin:10px 0 0;padding-left:18px}
  .s-principles li{margin:7px 0;font-size:13.5px;line-height:1.5;color:var(--muted)}
  .s-principles li b{color:var(--txt);font-weight:600}
  .s-section{margin-bottom:24px}
  .s-section-head{display:flex;align-items:baseline;gap:10px;margin-bottom:12px;flex-wrap:wrap}
  .s-section-head h2{font-size:14px;margin:0;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .s-section-head span{font-size:12.5px;color:var(--muted)}
  .s-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
  .s-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px}
  .s-card-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .s-card-head h3{font-size:14.5px;margin:0;font-weight:600}
  .s-focus{color:var(--muted);font-size:12.5px;margin:5px 0 10px;line-height:1.45}
  .s-ex .ex-row{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
  .s-ex .ex-row:first-child{border-top:0}
  .s-ex .name{color:var(--txt)}
  .s-ex .dose{color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}

  /* cloud sync */
  .cloud-pip{width:9px;height:9px;border-radius:50%;background:var(--faint);flex:0 0 auto}
  .cloud-pip.synced{background:var(--good)}
  .cloud-pip.saving,.cloud-pip.checking{background:var(--accent)}
  .cloud-pip.error,.cloud-pip.bad-token{background:#d9685f}
  #cloudBtn.on{border-color:color-mix(in srgb,var(--good) 50%,var(--line2));color:var(--good)}
  #cloudBtn[data-state="error"],#cloudBtn[data-state="bad-token"]{border-color:#d9685f;color:#d9685f}
  #syncBody code{background:var(--bg2);padding:1px 5px;border-radius:5px;font-size:12px}
  #syncBody a{color:var(--accent)}
  #syncBody ol{margin:0;padding-left:18px;font-size:13px;color:var(--muted);line-height:1.7}
  #syncBody .row{display:flex;gap:10px}
  ::-webkit-scrollbar{height:9px;width:9px}
  ::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}
  ::-webkit-scrollbar-thumb:hover{background:var(--faint)}
  ::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand">

/* ============================ STATE ============================ */
const LS_KEY = "grisedale.tracker.v1";            // legacy / fallback localStorage key
const DB_NAME = "grisedaleTracker", STORE = "app", STATE_KEY = "state";
const KM_TO_MI = 0.621371, M_TO_FT = 3.28084;
const defaultState = () => ({
  plan: SEED_PLAN.map(s=>({...s})), blocks: seedBlocks(), planName: "Grisedale Horseshoe",
  board:{}, done:{}, log:{}, edits:{}, custom:[], deleted:{},
  collapsed:{}, unit:"km", theme:"dark", tab:"plan", touched:false, updatedAt:0, seenTypes:[...TYPE_ORDER],
  filters:{types:[...TYPE_ORDER], rest:true, vis:"all", q:""}
});
let state = defaultState();   // in-memory source of truth; hydrated from IndexedDB on startup

/* ---- IndexedDB data layer (durable store, with a localStorage backup/fallback) ---- */
function idbOpen(){
  return new Promise((res,rej)=>{
    if(!('indexedDB' in window)) return rej(new Error("no-indexeddb"));
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=>{ const db=req.result; if(!db.objectStoreNames.contains(STORE)) db.createObjectStore(STORE); };
    req.onsuccess = ()=>res(req.result);
    req.onerror   = ()=>rej(req.error);
  });
}
function idbGet(key){ return idbOpen().then(db=>new Promise((res,rej)=>{
  const r = db.transaction(STORE,"readonly").objectStore(STORE).get(key);
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
})); }
function idbSet(key,val){ return idbOpen().then(db=>new Promise((res,rej)=>{
  const tx = db.transaction(STORE,"readwrite"); tx.objectStore(STORE).put(val,key);
  tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error);
})); }

// Normalise any loaded blob into a complete, current-schema state object.
function migrate(raw){
  const s = Object.assign(defaultState(), raw||{});
  s.filters = Object.assign(defaultState().filters, s.filters||{});
  s.seenTypes = s.seenTypes || [];
  TYPE_ORDER.forEach(t=>{                 // auto-enable any workout type added since this was saved
    if(!s.seenTypes.includes(t)){ s.seenTypes.push(t); if(!s.filters.types.includes(t)) s.filters.types.push(t); }
  });
  return s;
}

// Load persisted state: IndexedDB first, then migrate a legacy localStorage save if present.
async function hydrate(){
  let raw=null;
  try{ raw = await idbGet(STATE_KEY); }catch(e){}
  if(raw==null){ try{ const ls=localStorage.getItem(LS_KEY); if(ls) raw=JSON.parse(ls); }catch(e){} }
  if(raw!=null) state = migrate(raw);
}

let _saveTimer=null, _lastDataSer=null;
// Plan DATA (synced to the cloud); view prefs (theme/unit/tab/filters/collapsed) stay per-device.
const DATA_KEYS=["plan","blocks","planName","board","done","log","edits","custom","deleted","seenTypes","touched","updatedAt"];
function dataSig(){ const o={}; for(const k of DATA_KEYS){ if(k!=="updatedAt") o[k]=state[k]; } return JSON.stringify(o); }
function save(){ if(_saveTimer) clearTimeout(_saveTimer); _saveTimer=setTimeout(persist,120); }
function writeLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(_){ } idbSet(STATE_KEY, state).catch(()=>{}); }
function persist(){
  _saveTimer=null;
  const sig=dataSig();
  const changed = _lastDataSer!==null && sig!==_lastDataSer;
  if(changed) state.updatedAt=Date.now();
  if(_lastDataSer===null || changed) _lastDataSer=sig;
  writeLocal();                              // localStorage backup + IndexedDB (always)
  if(changed && typeof cloudPush==="function") cloudPush();   // push real data changes to the gist
}

/* ============================ HELPERS ============================ */
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function d(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y, m-1, dd); } // local midnight, no UTC shift
function iso(x){ const p=n=>String(n).padStart(2,"0"); return `${x.getFullYear()}-${p(x.getMonth()+1)}-${p(x.getDate())}`; }
function mondayOf(s){ const x=d(s); const k=(x.getDay()+6)%7; x.setDate(x.getDate()-k); return iso(x); }
function addDays(s,n){ const x=d(s); x.setDate(x.getDate()+n); return iso(x); }
const WD=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"], MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function dayShort(iso){ const x=d(iso); return WD[x.getDay()]+" "+x.getDate(); }
function dayLong(iso){ const x=d(iso); return WD[x.getDay()]+", "+x.getDate()+" "+MO[x.getMonth()]+" "+x.getFullYear(); }
function mdShort(iso){ const x=d(iso); return MO[x.getMonth()]+" "+x.getDate(); }
function todayISO(){ return iso(new Date()); }

// Effective workout (raw/custom + edits), or null if deleted
function allRaw(){ return (state.plan||[]).concat(state.custom||[]); }
function getWO(id){
  if(state.deleted[id]) return null;
  const base = allRaw().find(w=>w.id===id);
  if(!base) return null;
  return Object.assign({}, base, state.edits[id]||{});
}
function woMap(){ const m={}; allRaw().forEach(w=>{ if(!state.deleted[w.id]) m[w.id]=getWO(w.id); }); return m; }

// Build/repair the board: ensure every active workout sits in exactly one day cell.
function ensureBoard(){
  const seen = new Set();
  for(const k in state.board){
    state.board[k] = (state.board[k]||[]).filter(id=>{
      if(seen.has(id)) return false;
      const w = getWO(id);
      if(!w) return false;
      seen.add(id); return true;
    });
  }
  allRaw().forEach(w=>{
    if(state.deleted[w.id] || seen.has(w.id)) return;
    const day = (getWO(w.id)||w).date;
    (state.board[day] = state.board[day]||[]).push(w.id);
    seen.add(w.id);
  });
}
function removeFromBoard(id){ for(const k in state.board) state.board[k]=state.board[k].filter(x=>x!==id); }

// Week range is derived from the plan's dates, so any imported plan renders correctly.
function planDateSet(){
  const set=new Set();
  allRaw().forEach(w=>{ if(!state.deleted[w.id]) set.add(w.date); });
  for(const k in state.board){ if((state.board[k]||[]).length) set.add(k); }
  return set;
}
function weekMondays(){
  const set=planDateSet(); if(!set.size) return [];
  let min=null,max=null; set.forEach(dt=>{ if(min===null||dt<min)min=dt; if(max===null||dt>max)max=dt; });
  const out=[]; let m=mondayOf(min); const last=mondayOf(max); let g=0;
  while(m<=last && g++<1040){ out.push(m); m=addDays(m,7); }
  return out;
}

function unitDist(km){
  if(km==null) return null;
  return state.unit==="mi" ? km*KM_TO_MI : km;
}
function fmtDist(km,withUnit=true){
  if(km==null) return "—";
  const v = state.unit==="mi" ? km*KM_TO_MI : km;
  const s = (v>=100? Math.round(v) : (Math.round(v*10)/10)).toLocaleString();
  return withUnit ? s+" "+state.unit : s;
}
function fmtDur(min){
  if(!min) return "—";
  const h=Math.floor(min/60), m=Math.round(min%60);
  return h? (m? `${h}h ${m}m` : `${h}h`) : `${m}m`;
}
function fmtVert(m,withUnit=true){
  if(m==null) return "—";
  const v = state.unit==="mi" ? Math.round(m*M_TO_FT) : m;
  const s = v.toLocaleString();
  return withUnit ? s+(state.unit==="mi"?" ft":" m") : s;
}

function totals(ids){
  let dist=0,dur=0,vert=0,total=0,done=0,dDist=0,dDur=0,dVert=0;
  let runDur=0,runDist=0,bikeDur=0,bikeDist=0,runDoneDur=0,runDoneDist=0,bikeDoneDur=0,bikeDoneDist=0;
  ids.forEach(id=>{
    const w=getWO(id); if(!w) return;
    const isRest = w.t==="Rest", isBike = w.t==="Bike";
    const lg = state.log[id]||{};
    const k = lg.k!=null&&lg.k!==""? +lg.k : (w.k||0);
    const mm = lg.d!=null&&lg.d!==""? +lg.d : (w.d||0);
    const vv = lg.v!=null&&lg.v!==""? +lg.v : (w.v||0);
    dist+=(w.k||0); dur+=(w.d||0); vert+=(w.v||0);
    if(isBike){ bikeDur+=(w.d||0); bikeDist+=(w.k||0); }
    else if(!isRest){ runDur+=(w.d||0); runDist+=(w.k||0); }
    if(!isRest) total++;
    if(state.done[id]){
      if(!isRest) done++;
      dDist+=k; dDur+=mm; dVert+=vv;
      if(isBike){ bikeDoneDur+=mm; bikeDoneDist+=k; }
      else if(!isRest){ runDoneDur+=mm; runDoneDist+=k; }
    }
  });
  return {dist,dur,vert,total,done,dDist,dDur,dVert,
          runDur,runDist,bikeDur,bikeDist,runDoneDur,runDoneDist,bikeDoneDur,bikeDoneDist};
}
function daysBetween(a,b){ return Math.round((d(b)-d(a))/86400000); }

  const races = allRaw().map(s=>getWO(s.id)).filter(w=>w&&w.t==="Race")

  if(races.length){
    const upcoming = races.filter(r=>daysBetween(t,r.date)>=0);
    if(upcoming.length) upcoming.slice(0,2).forEach(r=>{ const dd=daysBetween(t,r.date); parts.push(dd===0?`${clean(r.n)} today 🏁`:`${dd}d to ${clean(r.n)}`); });
    else parts.push("Plan complete 🏁");
  }else if(nWeeks){
    const firstD=mondays[0], lastD=addDays(mondays[nWeeks-1],6), start=daysBetween(t,firstD);
    if(start>0) parts.push(`Starts in ${start}d`);
    else if(daysBetween(t,lastD)>=0) parts.push(`Week ${Math.min(Math.max(Math.floor(daysBetween(firstD,t)/7)+1,1),nWeeks)} of ${nWeeks}`);
    else parts.push("Plan complete");
  }
  $("#countdown").textContent = parts.join("  ·  ");
}

function passesFilter(w){
  const f = state.filters;
  if(!f.types.includes(w.t)) return false;
  if(!f.rest && w.t==="Rest") return false;
  if(f.vis==="done" && !state.done[w.id]) return false;
  if(f.vis==="todo" && state.done[w.id]) return false;
  if(f.q){ const q=f.q.toLowerCase(); if(!((w.n||"").toLowerCase().includes(q) || (w.note||"").toLowerCase().includes(q) || w.t.toLowerCase().includes(q))) return false; }
  return true;
}

function cardHTML(id){
  const w = getWO(id); if(!w) return "";

  if(w.z && w.z!=="—") meta.push(`<span class="pill zone">${esc(w.z)}</span>`);
  const cls = ["card", state.done[id]?"done":"", w.t==="Race"?"race":"", w.t==="Rest"?"rest":""].filter(Boolean).join(" ");
  return `<div class="${cls}" draggable="true" data-id="${id}" style="--c:${ty.c}">

function renderWeeks(){
  const mondays = weekMondays();
  let html = "";
  mondays.forEach((mon,wi)=>{
    const blk = state.blocks && state.blocks[mon];
    const collapsed = !!state.collapsed[mon];
    const weekIds = [];
    let cells = "";
    for(let di=0; di<7; di++){
      const date = addDays(mon, di);
      const ids = (state.board[date]||[]);
      ids.forEach(id=>weekIds.push(id));
      const visible = ids.filter(id=>{ const w=getWO(id); return w && passesFilter(w); });
      const isToday = date===todayISO();
      const cardsHTML = visible.map(cardHTML).join("");
      cells += `<div class="day-cell ${isToday?'is-today':''}" data-date="${date}">
          <div class="day-head ${isToday?'today':''}">
            <span><span class="dnum">${dayShort(date)}</span></span>

          </div>
          ${cardsHTML || (ids.length? "" : `<div class="empty">—</div>`)}
        </div>`;
    }
    const T = totals(weekIds);
    const wstats = `
      <div class="wstat"><b>${fmtDist(T.runDist)}</b>${T.bikeDist?` <span style="color:var(--t-bike)">+${fmtDist(T.bikeDist)}</span>`:""}</div>

      ? `<span class="phasebadge ${(''+blk.phase).indexOf('2')>=0?'phase2':'phase1'}">${typeof blk.phase==='number'?('Phase '+blk.phase):esc(blk.phase)}</span>`

/* -------- Undo / redo (in-memory, per session) -------- */
let undoStack=[], redoStack=[];
function pushUndo(){ state.touched=true; try{ undoStack.push(JSON.stringify(state)); if(undoStack.length>60) undoStack.shift(); redoStack.length=0; }catch(e){} }
function undo(){ if(!undoStack.length) return; try{ redoStack.push(JSON.stringify(state)); state=JSON.parse(undoStack.pop()); save(); render(); }catch(e){} }
function redo(){ if(!redoStack.length) return; try{ undoStack.push(JSON.stringify(state)); state=JSON.parse(redoStack.pop()); save(); render(); }catch(e){} }
function updateUndoUI(){ const b=$("#undoBtn"); if(b) b.disabled = undoStack.length===0; }
// Never let an edit hide a session behind an inactive type filter.
function ensureTypeVisible(t){ if(!t) return; if(!state.seenTypes.includes(t)) state.seenTypes.push(t); if(!state.filters.types.includes(t)) state.filters.types.push(t); }

let dragId=null, lastDragEnd=0, ph=null;
function getPlaceholder(){ if(!ph){ ph=document.createElement("div"); ph.className="empty"; ph.style.borderColor="var(--accent)"; ph.style.color="var(--accent2)"; ph.textContent="drop here"; } return ph; }
function clearPH(){ if(ph&&ph.parentNode) ph.parentNode.removeChild(ph); }
function afterEl(container,y){
  const cards=[...container.querySelectorAll('.card:not(.dragging)')];
  let best=null,bestOff=-Infinity;
  for(const c of cards){ const r=c.getBoundingClientRect(); const off=y-r.top-r.height/2; if(off<0&&off>bestOff){bestOff=off;best=c;} }
  return best;
}
weeksEl.addEventListener("dragstart", e=>{
  const card=e.target.closest(".card"); if(!card) return;
  dragId=card.dataset.id; e.dataTransfer.effectAllowed="move";
  try{ e.dataTransfer.setData("text/plain", dragId); }catch(_){}
  setTimeout(()=>card.classList.add("dragging"),0);
});
weeksEl.addEventListener("dragend", e=>{
  const card=e.target.closest(".card"); if(card) card.classList.remove("dragging");
  $$(".day-cell.drag-over").forEach(c=>c.classList.remove("drag-over"));
  clearPH(); lastDragEnd=Date.now(); dragId=null;
});
weeksEl.addEventListener("dragover", e=>{
  const cell=e.target.closest(".day-cell"); if(!cell||!dragId) return;
  e.preventDefault(); e.dataTransfer.dropEffect="move";
  $$(".day-cell.drag-over").forEach(c=>{ if(c!==cell) c.classList.remove("drag-over"); });
  cell.classList.add("drag-over");
  const emptyEl = cell.querySelector(".empty:not(.dropph)"); // remove placeholder marker if real empty
  const after=afterEl(cell,e.clientY); const p=getPlaceholder();
  if(after) cell.insertBefore(p, after); else cell.appendChild(p);
});
weeksEl.addEventListener("drop", e=>{
  const cell=e.target.closest(".day-cell"); if(!cell||!dragId) return;
  e.preventDefault();
  const date=cell.dataset.date; const after=afterEl(cell,e.clientY);
  moveWorkout(dragId, date, after?after.dataset.id:null);
});
function moveWorkout(id,date,beforeId){
  pushUndo();
  removeFromBoard(id);
  const arr = state.board[date] = state.board[date]||[];
  let idx = arr.length;
  if(beforeId){ const i=arr.indexOf(beforeId); if(i>=0) idx=i; }
  arr.splice(idx,0,id);
  clearPH(); save(); render();
}

/* ============================ CSV PLAN IMPORT / EXPORT ============================ */
// Schema: date,session,type,duration_min,distance_km,vert_m,zone,phase,block,notes
function parseCSV(text){
  text = text.replace(/^﻿/,"").replace(/\r\n?/g,"\n");
  const rows=[]; let row=[], field="", q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else q=false; } else field+=c; }
    else { if(c==='"') q=true; else if(c===','){ row.push(field); field=""; }
           else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; } else field+=c; }
  }
  if(field.length || row.length){ row.push(field); rows.push(row); }
  return rows.filter(r=>!(r.length===1 && r[0].trim()===""));
}
function csvCell(v){ v=(v==null?"":String(v)); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; }
function normType(s){
  s=(s||"").trim().toLowerCase(); if(!s) return "Easy";
  for(const k of TYPE_ORDER){ if(k.toLowerCase()===s || TYPES[k].label.toLowerCase()===s) return k; }
  if(/bike|cycle|ride|spin|turbo/.test(s)) return "Bike";
  if(/recover/.test(s)) return "Recovery";
  if(/threshold|tempo|cruise/.test(s)) return "Threshold";
  if(/hill|vo2|interval|\brep/.test(s)) return "Hills";
  if(/descen|downhill/.test(s)) return "Descent";
  if(/sim|up.?down/.test(s)) return "Simulation";
  if(/long|mountain|recce/.test(s)) return "Long";
  if(/race/.test(s)) return "Race";
  if(/rest|off|walk/.test(s)) return "Rest";
  return "Easy";
}
function parsePlanDate(s){
  s=(s||"").trim(); if(!s) return null;
  if(/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)){ const [y,m,dd]=s.split("-").map(Number); const dt=new Date(y,m-1,dd); return isNaN(dt)?null:iso(dt); }
  const dt=new Date(s); return isNaN(dt)?null:iso(dt);   // fallback for "8 Jun 2026" etc.
}
function planToCSV(){
  const head=["date","session","type","duration_min","distance_km","vert_m","zone","phase","block","notes"];
  const lines=[head.join(",")];
  weekMondays().forEach(mon=>{
    const blk=(state.blocks&&state.blocks[mon])||{};
    for(let di=0;di<7;di++){ const date=addDays(mon,di); (state.board[date]||[]).forEach(id=>{
      const w=getWO(id); if(!w) return;
      lines.push([date,w.n,w.t,w.d??"",w.k??"",w.v??"",(w.z&&w.z!=="—")?w.z:"",blk.phase??"",blk.label??"",w.note??""].map(csvCell).join(","));
    });}
  });
  return lines.join("\n");
}
function importCSV(text, name){
  const rows=parseCSV(text);
  if(rows.length<2){ alert("That CSV looks empty."); return; }
  const head=rows[0].map(h=>h.trim().toLowerCase());
  const idx=(...names)=>{ for(const n of names){ const i=head.indexOf(n); if(i>=0) return i; } return -1; };
  const iDate=idx("date"), iName=idx("session","name","workout","title"), iType=idx("type","activity"),
        iDur=idx("duration_min","duration","minutes","min","time"), iDist=idx("distance_km","distance","km"),
        iVert=idx("vert_m","vert","elevation","climb","ascent"), iZone=idx("zone","effort","intensity"),
        iPhase=idx("phase"), iBlock=idx("block","week","label"), iNote=idx("notes","note","why","description","details");
  if(iDate<0 || iName<0){
    alert("CSV needs at least a 'date' and 'session' column.\n\nExpected header:\ndate, session, type, duration_min, distance_km, vert_m, zone, phase, block, notes");
    return;
  }
  if(!confirm("Load this plan?\n\nThis replaces the current plan and its layout. Completions on matching days are kept; everything else for this plan resets.\n\n(Tip: export a JSON backup first if you're unsure.)")) return;
  pushUndo();
  const sessions=[], blocks={}, perDate={};
  for(let r=1;r<rows.length;r++){
    const row=rows[r]; const date=parsePlanDate(row[iDate]); if(!date) continue;
    const k=(perDate[date]||0); perDate[date]=k+1;
    const id=`${date}#${k}`;
    sessions.push({ id, date,
      n:(row[iName]||"").trim()||"Session",
      t: iType>=0?normType(row[iType]):"Easy",
      d: iDur>=0?numOrNull(row[iDur]):null, k: iDist>=0?numOrNull(row[iDist]):null,
      v: iVert>=0?numOrNull(row[iVert]):null,
      z:(iZone>=0?(row[iZone]||"").trim():"")||"—",
      note:(iNote>=0?(row[iNote]||"").trim():"") });
    const mon=mondayOf(date);
    if(!blocks[mon]){ const ph=iPhase>=0?(row[iPhase]||"").trim():"", lb=iBlock>=0?(row[iBlock]||"").trim():"";
      if(ph||lb) blocks[mon]={ phase:/^\d+$/.test(ph)?+ph:(ph||null), label:lb||"" }; }
  }
  if(!sessions.length){ alert("No valid rows found — each row needs a real date (YYYY-MM-DD)."); return; }
  const ids=new Set(sessions.map(s=>s.id));
  const keep=o=>{ const n={}; for(const key in o){ if(ids.has(key)) n[key]=o[key]; } return n; };
  state.plan=sessions; state.blocks=blocks; state.custom=[]; state.board={}; state.deleted={}; state.edits={};
  state.done=keep(state.done); state.log=keep(state.log);
  state.planName = name || "Imported plan";
  save(); render();
  alert(`Loaded "${state.planName}" — ${sessions.length} sessions across ${weekMondays().length} weeks.`);
}
function fileBaseName(fn){ return (fn||"plan").replace(/\.[^.]+$/,"").replace(/[_-]+/g," ").trim() || "Imported plan"; }
function download(filename, text, type){
  const b=new Blob([text],{type:type||"text/plain"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(b); a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

/* ============================ MENU ============================ */
const menu=$("#menu");
function toggleMenu(show){ menu.hidden = (show===undefined)? !menu.hidden : !show; }
$("#menuBtn").onclick = e=>{ e.stopPropagation(); $("#filterMenu").hidden=true; toggleMenu(); };
document.addEventListener("click", e=>{ if(!menu.hidden && !e.target.closest(".menuwrap")) toggleMenu(false); });
menu.addEventListener("click", e=>{
  const b=e.target.closest("button[data-act]"); if(!b) return;
  toggleMenu(false);
  switch(b.dataset.act){
    case "exportCsv":  download((state.planName||"plan").replace(/\s+/g,"-").toLowerCase()+".csv", planToCSV(), "text/csv"); break;
    case "importCsv":  $("#importCsvFile").click(); break;
    case "exportJson": download("tracker-backup.json", JSON.stringify(state,null,2), "application/json"); break;
    case "importJson": $("#importJsonFile").click(); break;
    case "clear":      if(confirm("Clear all completions and logs (keep the plan & layout)?")){ pushUndo(); state.done={}; state.log={}; save(); render(); } break;
    case "reset":      if(confirm("Reset to the original Grisedale seed plan? This wipes the current plan, layout, logs and edits.")){ pushUndo(); state=defaultState(); save(); render(); } break;
  }
});
$("#importJsonFile").addEventListener("change", e=>{ const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ const next=migrate(JSON.parse(r.result)); pushUndo(); state=next; save(); render(); alert("Backup restored."); }catch(err){ alert("Could not read that JSON file."); } };
  r.readAsText(f); e.target.value=""; });
$("#importCsvFile").addEventListener("change", e=>{ const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=()=>{ try{ importCSV(r.result, fileBaseName(f.name)); }catch(err){ alert("Could not read that CSV."); } };
  r.readAsText(f); e.target.value=""; });

/* ============================ DRAG-AND-DROP FILE IMPORT ============================ */
const dz=$("#dropzone"); let dzDepth=0;
function isFileDrag(e){ const ts=e.dataTransfer? Array.from(e.dataTransfer.types||[]):[]; return ts.includes("Files")||ts.some(t=>/file/i.test(t)); }
function handleFile(f){
  const r=new FileReader(); const isJson=/\.json$/i.test(f.name);
  r.onload=()=>{ try{ if(isJson){ const next=migrate(JSON.parse(r.result)); pushUndo(); state=next; save(); render(); alert("Backup restored."); }
                       else importCSV(r.result, fileBaseName(f.name)); }
                 catch(err){ alert("Could not read that file."); } };
  r.readAsText(f);
}
window.addEventListener("dragenter", e=>{ if(!isFileDrag(e))return; e.preventDefault(); dzDepth++; dz.classList.add("show"); });
window.addEventListener("dragover",  e=>{ if(!isFileDrag(e))return; e.preventDefault(); try{e.dataTransfer.dropEffect="copy";}catch(_){} });
window.addEventListener("dragleave", e=>{ if(!isFileDrag(e))return; dzDepth--; if(dzDepth<=0){ dzDepth=0; dz.classList.remove("show"); } });
window.addEventListener("drop",      e=>{ if(!isFileDrag(e))return; e.preventDefault(); dzDepth=0; dz.classList.remove("show");
  const f=e.dataTransfer.files && e.dataTransfer.files[0]; if(f) handleFile(f); });

/* ============================ CLOUD SYNC (private GitHub Gist) ============================ */
const GH_API="https://api.github.com", GIST_MARKER="grisedale-tracker-sync", GIST_FILE="tracker-state.json";
const cloud={ token:null, gistId:null, login:null, status:"off", busy:false };
try{ cloud.token=localStorage.getItem("gh.token")||null; cloud.gistId=localStorage.getItem("gh.gistId")||null; cloud.login=localStorage.getItem("gh.login")||null; }catch(_){}
const cloudOn=()=>!!cloud.token;
function ghHeaders(){ return {"Authorization":"Bearer "+cloud.token,"Accept":"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"}; }
async function gh(path,opts){ const r=await fetch(GH_API+path,Object.assign({headers:ghHeaders()},opts)); if(!r.ok){ const e=new Error("GitHub "+r.status); e.status=r.status; throw e; } return r.status===204?null:r.json(); }
function pick(keys){ const o={}; keys.forEach(k=>{ if(k in state) o[k]=state[k]; }); return o; }
function setStatus(s){ cloud.status=s; renderCloud(); }

async function cloudConnect(token,{silent}={}){
  token=(token||"").trim(); if(!token) return;
  cloud.token=token; setStatus("checking");
  try{
    try{ const me=await gh("/user"); if(me&&me.login){ cloud.login=me.login; localStorage.setItem("gh.login",me.login); } }
    catch(e){ if(e.status===401) throw e; }
    localStorage.setItem("gh.token",token);
    await cloudFindGist();
    await cloudInitialSync();
    setStatus("synced");
  }catch(e){
    if(e.status===401){ cloud.token=null; try{localStorage.removeItem("gh.token");}catch(_){} setStatus("bad-token"); if(!silent) renderSyncBody(); }
    else setStatus("error");
  }
}
async function cloudFindGist(){
  if(cloud.gistId){ try{ await gh("/gists/"+cloud.gistId); return; }catch(e){ if(e.status===404) cloud.gistId=null; else throw e; } }
  const list=await gh("/gists?per_page=100");
  const found=(list||[]).find(g=> g.description===GIST_MARKER || (g.files && g.files[GIST_FILE]));
  cloud.gistId=found?found.id:null;
  if(cloud.gistId) localStorage.setItem("gh.gistId",cloud.gistId);
}
async function cloudReadRemote(){
  if(!cloud.gistId) return null;
  const g=await gh("/gists/"+cloud.gistId); const f=g.files&&g.files[GIST_FILE]; if(!f) return null;
  let c=f.content; if(f.truncated&&f.raw_url){ c=await (await fetch(f.raw_url)).text(); }
  try{ return JSON.parse(c); }catch(_){ return null; }
}
function adoptRemote(remote){
  DATA_KEYS.forEach(k=>{ if(k in remote) state[k]=remote[k]; });
  state=migrate(state); _lastDataSer=dataSig(); writeLocal(); render();
}
async function cloudInitialSync(){
  const remote=await cloudReadRemote();
  if(!remote){ await cloudPushNow(); return; }                       // cloud empty → upload this device
  const rT=remote.updatedAt||0, lT=state.updatedAt||0;
  if(!state.touched || rT>lT){ adoptRemote(remote); return; }        // fresh device, or cloud newer → take cloud
  if(lT>rT){
    const useCloud=confirm("The cloud already has a saved plan, and this device also has unsaved changes.\n\nOK = use the CLOUD copy here.\nCancel = upload THIS device's version (replaces cloud).");
    if(useCloud) adoptRemote(remote); else await cloudPushNow();
  }
}
async function cloudPull(){
  if(!cloudOn()||cloud.busy) return; cloud.busy=true;
  try{ if(!cloud.gistId) await cloudFindGist(); const remote=await cloudReadRemote();
    if(remote && (remote.updatedAt||0)>(state.updatedAt||0)) adoptRemote(remote);
    if(cloud.status==="error"||cloud.status==="checking") setStatus("synced");
  }catch(e){}
  finally{ cloud.busy=false; }
}
let _pushTimer=null;
function cloudPush(){ if(!cloudOn()) return; if(_pushTimer) clearTimeout(_pushTimer); _pushTimer=setTimeout(cloudPushNow,1200); }
async function cloudPushNow(){
  _pushTimer=null; if(!cloudOn()) return;
  const body=JSON.stringify({ description:GIST_MARKER, public:false, files:{ [GIST_FILE]:{ content:JSON.stringify(pick(DATA_KEYS)) } } });
  try{ setStatus("saving");
    if(!cloud.gistId){ const g=await gh("/gists",{method:"POST",body}); cloud.gistId=g.id; localStorage.setItem("gh.gistId",g.id); }
    else await gh("/gists/"+cloud.gistId,{method:"PATCH",body});
    setStatus("synced");
  }catch(e){ if(e.status===404){ cloud.gistId=null; try{localStorage.removeItem("gh.gistId");}catch(_){} return cloudPushNow(); } setStatus("error"); }
}
function cloudDisconnect(){
  cloud.token=null; cloud.gistId=null; cloud.login=null; setStatus("off");
  try{ localStorage.removeItem("gh.token"); localStorage.removeItem("gh.gistId"); localStorage.removeItem("gh.login"); }catch(_){}
}

/* ---- cloud UI ---- */
function renderCloud(){
  const b=$("#cloudBtn"); if(b){ const tick={synced:" ✓",saving:" …",checking:" …",error:" !","bad-token":" !"}[cloud.status]||"";
    b.textContent="☁"+tick; b.dataset.state=cloud.status; b.classList.toggle("on", cloud.status==="synced"||cloud.status==="saving"); }
  const sb=$("#syncBackdrop"); if(sb && sb.classList.contains("open")) renderSyncBody();
}
function renderSyncBody(){
  const host=$("#syncBody"); if(!host) return;
  if(cloudOn() && cloud.status!=="bad-token"){
    const label={synced:"Synced",saving:"Saving…",checking:"Connecting…",error:"Can't reach GitHub right now"}[cloud.status]||"Connected";
    host.innerHTML=`
      <div class="donerow"><span class="cloud-pip ${cloud.status}"></span><div><b>${esc(label)}</b><div style="font-size:12px;color:var(--muted)">${cloud.login?("Signed in as "+esc(cloud.login)+" · "):""}private gist</div></div></div>
      <p style="font-size:13px;color:var(--muted);line-height:1.55;margin:0">Your plan & progress sync to a private GitHub gist. Open the app on your other device, connect with the <b>same token</b>, and they'll stay in step. Changes pull in when you switch back to the app.</p>
      <div class="row"><button class="btn" id="syncNow">Sync now</button><button class="btn danger" id="syncOff">Disconnect this device</button></div>`;
    $("#syncNow").onclick=async()=>{ await cloudPushNow(); await cloudPull(); };
    $("#syncOff").onclick=()=>{ if(confirm("Stop syncing on this device? Your data stays here and in the gist — it just won't sync from this browser anymore.")) cloudDisconnect(); };
  } else {
    host.innerHTML=`
      <p style="font-size:13px;color:var(--muted);line-height:1.55;margin:0">Sync your phone & laptop using your GitHub account — your data lives in a <b>private gist</b>, nothing public. The token is stored only in this browser.</p>
      <ol>
        <li>Create a token (it pre-selects the <b>gist</b> scope): <a href="https://github.com/settings/tokens/new?scopes=gist&description=Grisedale%20Tracker%20Sync" target="_blank" rel="noopener">github.com/settings/tokens</a> → <b>Generate token</b>.</li>
        <li>Copy it (starts with <code>ghp_</code>) and paste it below.</li>
        <li>Repeat on your other device with the <b>same token</b>.</li>
      </ol>
      ${cloud.status==="bad-token"?`<div style="color:#d9685f;font-size:12px">That token didn't work — it must be a <b>classic</b> token with the <b>gist</b> scope.</div>`:""}
      <div class="field"><label>GitHub token</label><input id="syncToken" type="password" placeholder="ghp_…" autocomplete="off" spellcheck="false"></div>
      <button class="btn primary" id="syncConnect">Connect & sync</button>`;
    const go=()=>{ const t=$("#syncToken").value; if(t.trim()) cloudConnect(t); };
    $("#syncConnect").onclick=go;
    $("#syncToken").addEventListener("keydown",e=>{ if(e.key==="Enter") go(); });
  }
}
function openSync(){ $("#syncBackdrop").classList.add("open"); renderSyncBody(); }
function closeSync(){ $("#syncBackdrop").classList.remove("open"); }
$("#cloudBtn").onclick=openSync;
$("#syncClose").onclick=closeSync;
$("#syncBackdrop").addEventListener("click",e=>{ if(e.target.id==="syncBackdrop") closeSync(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeSync(); });
window.addEventListener("focus", ()=>cloudPull());
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden) cloudPull(); });

/* ============================ GO ============================ */
let _rendered=false;
function firstRender(){ if(_rendered) return; _rendered=true; render(); }
hydrate().then(()=>{ _lastDataSer=dataSig(); firstRender(); renderCloud(); if(cloudOn()) cloudConnect(cloud.token,{silent:true}); }).catch(firstRender);
setTimeout(firstRender, 1200);   // safety: render even if the DB is slow/unavailable
</script>
</body>
